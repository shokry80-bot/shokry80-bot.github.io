fi" id="eph" value="'+(co.phone||'')+'"></div><div class="fm"><label class="fl">واتساب</label><input class="fi" id="ewa" value="'+(co.wa||'')+'"></div></div><div class="fg"><div class="fm"><label class="fl">بريد</label><input class="fi" id="eem" value="'+(co.email||'')+'"></div><div class="fm"><label class="fl">موقع</label><input class="fi" id="ewe" value="'+(co.web||'')+'"></div></div><div class="fg"><div class="fm"><label class="fl">المدينة</label><select class="fi" id="eci">'+CITIES.map(c=>'<option '+(co.city===c?'selected':'')+'>'+c+'</option>').join('')+'</select></div><div class="fm"><label class="fl">العنوان</label><input class="fi" id="ead" value="'+(co.address||'')+'"></div></div><div class="fg"><div class="fm"><label class="fl">إنستجرام</label><input class="fi" id="eig" value="'+(co.ig||'')+'"></div><div class="fm"><label class="fl">فيسبوك</label><input class="fi" id="efb" value="'+(co.fb||'')+'"></div></div></div></div><div class="card"><div class="card-h"><h3>🏷️ العروض</h3><button class="bt bt-g bt-s" onclick="ceAO()">➕</button></div><div class="card-b" id="ceOL">'+(co.offers||[]).map((o,i)=>'<div class="fg" style="margin-bottom:3px;grid-template-columns:2fr 1fr 1fr auto"><input class="fi" value="'+o.t+'" id="ot'+i+'"><input class="fi" value="'+o.p+'" id="op'+i+'"><input class="fi" value="'+(o.op||'')+'" id="oo'+i+'"><button class="bt bt-d bt-s" onclick="ceRO('+i+')">✕</button></div>').join('')+'</div></div><div class="card"><div class="card-h"><h3>📋 الخدمات</h3><button class="bt bt-g bt-s" onclick="ceAS()">➕</button></div><div class="card-b" id="ceSL">'+(co.services||[]).map((s,i)=>'<div class="fg" style="margin-bottom:3px;grid-template-columns:2fr 1fr auto"><input class="fi" value="'+s.n+'" id="sn'+i+'"><input class="fi" value="'+s.p+'" id="sp'+i+'"><button class="bt bt-d bt-s" onclick="ceRS('+i+')">✕</button></div>').join('')+'</div></div><button class="bt bt-o" style="width:100%;padding:10px;font-size:13px" onclick="ceSV()">💾 حفظ جميع التعديلات</button></div>'}
function ceAO(){const co=COS.find(c=>c.id===UP.cid);co.offers.push({t:'عرض',p:'0',op:'',d:''});saveCo(co);G('ce')}
function ceRO(i){const co=COS.find(c=>c.id===UP.cid);co.offers.splice(i,1);saveCo(co);G('ce')}
function ceAS(){const co=COS.find(c=>c.id===UP.cid);co.services.push({n:'خدمة',p:'0'});saveCo(co);G('ce')}
function ceRS(i){const co=COS.find(c=>c.id===UP.cid);co.services.splice(i,1);saveCo(co);G('ce')}
async function ceSV(){const co=COS.find(c=>c.id===UP.cid);if(!co)return;co.name=document.getElementById('en').value;co.about=document.getElementById('eab').value;co.vision=document.getElementById('ev').value;co.mission=document.getElementById('em').value;co.logo=document.getElementById('elo').value;co.cover=document.getElementById('eco').value;co.video=document.getElementById('evi').value;co.gallery=document.getElementById('ega').value.split('\n').filter(Boolean);co.phone=document.getElementById('eph').value;co.wa=document.getElementById('ewa').value;co.email=document.getElementById('eem').value;co.web=document.getElementById('ewe').value;co.city=document.getElementById('eci').value;co.address=document.getElementById('ead').value;co.ig=document.getElementById('eig').value;co.fb=document.getElementById('efb').value;co.offers=(co.offers||[]).map((o,i)=>({t:document.getElementById('ot'+i)?.value||o.t,p:document.getElementById('op'+i)?.value||o.p,op:document.getElementById('oo'+i)?.value||'',d:o.d}));co.services=(co.services||[]).map((s,i)=>({n:document.getElementById('sn'+i)?.value||s.n,p:document.getElementById('sp'+i)?.value||s.p}));await saveCo(co);toast('✅ تم الحفظ في السحابة!')}

// ═══ SEARCH ═══
let sT;function SR(t){clearTimeout(sT);sT=setTimeout(()=>{if(!t){G('home');return}fC='';fS='';fCi='';const l=COS.filter(c=>c.name.includes(t)||c.about?.includes(t)||(c.sub||'').includes(t)||(c.city||'').includes(t));document.getElementById('CT').innerHTML='<div class="pg"><div class="hdr"><h1>🔍 "'+t+'"</h1><p>'+l.length+' نتيجة</p></div><div class="mg">'+(l.length?l.map(CC).join(''):'<div style="grid-column:1/-1;text-align:center;padding:20px;color:var(--tm)">لا نتائج</div>')+'</div></div>'},300)}

// ═══ INIT ═══
async function init(){try{fbSt('ld','🔄 جاري الاتصال بـ Firebase...');await loadAll();fbSt('ok','🟢 متصل بالسحابة — '+COS.length+' شركة');RDY=true;US();G('home')}catch(err){fbSt('err','❌ خطأ: '+err.message);console.error(err);document.getElementById('CT').innerHTML='<div style="text-align:center;padding:40px"><div style="font-size:28px;margin-bottom:8px">❌</div><div style="color:var(--rd);font-size:12px;font-weight:700">فشل الاتصال بالسيرفر</div><div style="color:var(--tm);font-size:10px;margin-top:4px">'+err.message+'</div><button class="bt bt-o" style="margin-top:12px" onclick="init()">🔄 إعادة المحاولة</button></div>'}}
window.addEventListener('load',init);
</script>
</body>
</html>
